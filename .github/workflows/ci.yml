name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at midnight UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['oldstable', 'stable']
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build and test
        run: bash test.sh
